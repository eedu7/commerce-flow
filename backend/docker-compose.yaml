services:
  pg-database:
    image: postgres:18.3
    env_file: .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pg-data:/var/lib/postgresql

  pgadmin:
    image: dpage/pgadmin4:latest
    env_file: .env
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      - pg-database
    volumes:
      - pg-admin-data:/var/lib/pgadmin
volumes:
  pg-data:
  pg-admin-data:

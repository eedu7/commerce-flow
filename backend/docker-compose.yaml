services:
  pg-database:
    image: postgres:18.3
    env_file: .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pg-data:/var/lib/postgresql

  pg-database-test:
    image: postgres:18.3
    env_file: .env
    environment:
      POSTGRES_USER: ${TEST_POSTGRES_USER}
      POSTGRES_PASSWORD: ${TEST_POSTGRES_PASSWORD}
      POSTGRES_DB: ${TEST_POSTGRES_DB}
    ports:
      - "${TEST_POSTGRES_PORT}:5432"
    volumes:
      - pg-data-test:/var/lib/postgresql

  floci:
    image: floci/floci:latest
    env_file:
      - .env
    ports:
      - "4566:4566"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
    environment:
      FLOCI_STORAGE_MODE: hybrid
      FLOCI_SERVICES_DOCKER_NETWORK: myapp_default
  
  pgadmin:
    image: dpage/pgadmin4:latest
    env_file: .env
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      - pg-database
      - pg-database-test
    volumes:
      - pg-admin-data:/var/lib/pgadmin
      
volumes:
  pg-data:
  pg-data-test:
  pg-admin-data:
